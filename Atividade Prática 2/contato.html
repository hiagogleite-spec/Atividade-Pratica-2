<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header id="topo">
    <h1>Fale Conosco</h1>
    <p>Entre em contato com a Master Tech e solicite nossos serviços</p>
</header>

<nav class="menu">
    <a href="index.html">Inicio</a>
    <a href="servicos.html">Serviços</a>
    <a href="contato.html">Contato</a>
</nav> 

<section class="container">
    <p class="texto">
    Somos especializados em desesvolvimento de sites, sistemas personalizados 
    e suporte técnico. Preencha o formulário abaixo e entraremos em contato. 
   </p>

<form class="formulario">

   <label>Nome:</label>
   <input type="text" required>

   <label>Email:</label>
   <input type="email" required>

   <label>Tipo de Serviços:</label>
   <select required>
   <option value="Selecione"></option>
   <option>Desenvolvimento de Sites</option>
   <option>Sistemas Personalizados</option>
   <option>Suporte Técnico</option>
</select>

   <label>Mensagem:</label>
   <textarea required></textarea>

   <button type="submit">Enviar</button>
   <button type="reset">Limpar</button>

</section>
</form>

</body>
</html>
